<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AIサイト制作サービス</title>
<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f9f9f9;
}
header {
  background: #000;
  color: #fff;
  padding: 20px;
  text-align: center;
}
.hero {
  padding: 60px 20px;
  text-align: center;
  background: linear-gradient(135deg, #111, #444);
  color: white;
}
.hero h1 {
  font-size: 32px;
  margin-bottom: 20px;
}
.hero p {
  font-size: 18px;
}
.btn {
  margin-top: 20px;
  padding: 15px 25px;
  background: #ff6600;
  color: white;
  text-decoration: none;
  border-radius: 5px;
  display: inline-block;
}
.section {
  padding: 50px 20px;
  text-align: center;
}
.card {
  background: white;
  margin: 20px auto;
  padding: 20px;
  max-width: 300px;
  border-radius: 10px;
  box-shadow: 0 0 10px rgba(0,0,0,0.1);
}
.footer {
  background: #000;
  color: #fff;
  text-align: center;
  padding: 20px;
}
</style>
</head>
<body>

<header>
<h2>AIサイト制作サービス</h2>
</header>

<section class="hero">
<h1>最短1日であなたのサイトを作成</h1>
<p>AIを活用した最新のWeb制作で低価格・高品質を実現</p>
<a href="#contact" class="btn">今すぐ問い合わせ</a>
</section>

<section class="section">
<h2>こんな悩みありませんか？</h2>
<div class="card">サイトを作りたいが高すぎる</div>
<div class="card">制作会社に頼むと時間がかかる</div>
<div class="card">集客できるサイトが欲しい</div>
</section>

<section class="section">
<h2>サービス内容</h2>
<div class="card">LP制作（集客特化）</div>
<div class="card">予約システム導入</div>
<div class="card">スマホ最適化対応</div>
</section>

<section class="section">
<h2>料金</h2>
<div class="card">
<h3>ライトプラン</h3>
<p>¥30,000</p>
</div>
<div class="card">
<h3>スタンダード</h3>
<p>¥50,000</p>
</div>
<div class="card">
<h3>プレミアム</h3>
<p>¥100,000</p>
</div>
</section>

<section class="section" id="contact">
<h2>お問い合わせ</h2>
<p>LINEまたはメールでご連絡ください</p>
<a href="#" class="btn">LINEで問い合わせ</a>
</section>

<div class="footer">
<p>© 2026 AIサイト制作</p>
</div>

</body>
</html>
